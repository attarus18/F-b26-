<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Story Planner — Andrea Feralo</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0C0C1A; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0C0C1A; }
    ::-webkit-scrollbar-thumb { background: #25255A; border-radius: 3px; }
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const C = {
  bg:"#0C0C1A", panel:"#11112A", card:"#181835", border:"#25255A",
  gold:"#C8A462", goldLt:"#E2C07A", text:"#E6DDD0", sub:"#9898B8",
  danger:"#7A2E2E", warn:"#6A4E1E", success:"#1E5A38",
  overlay:"rgba(0,0,0,0.75)",
};
const STATO_COLOR = {"Da scrivere":C.danger,"In bozza":C.warn,"Completato":C.success};
const STATO_TEXT  = {"Da scrivere":"#D07070","In bozza":"#C09040","Completato":"#50C080"};
const RUOLO_COLOR = {"Protagonista":"#2B4F7A","Antagonista":"#6A2020","Deuteragonista":"#3A5A3A","Secondario":"#4A3A6A","Comparsa":"#3A3A4A"};
const IMP_COLOR   = {"Minore":C.border,"Importante":C.warn,"Cruciale":C.danger};
const IMP_TEXT    = {"Minore":C.sub,"Importante":"#C09040","Cruciale":"#D07070"};
const RUOLI       = ["Protagonista","Antagonista","Deuteragonista","Secondario","Comparsa"];
const STATI       = ["Da scrivere","In bozza","Completato"];
const TIPI_LUOGO  = ["Interno","Esterno","Urbano","Naturale","Industriale","Altro"];
const IMPORTANZA  = ["Minore","Importante","Cruciale"];
const TABS        = ["Panoramica","Personaggi","Capitoli","Luoghi","Timeline","Note"];
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);

function lsGet(k) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} }

function Badge({label,bg,fg}) {
  return <span style={{background:bg+"30",border:`1px solid ${bg}55`,color:fg,borderRadius:4,fontSize:11,padding:"2px 8px",fontWeight:600,letterSpacing:"0.5px",textTransform:"uppercase"}}>{label}</span>;
}
function Btn({children,onClick,variant="gold",size="sm",style:sx={}}) {
  const sizes={sm:{padding:"6px 14px",fontSize:13},md:{padding:"9px 22px",fontSize:14}};
  const vars={gold:{background:C.gold,color:"#0C0C1A"},ghost:{background:"transparent",color:C.sub,border:`1px solid ${C.border}`},danger:{background:C.danger+"BB",color:"#FFCCCC"}};
  return <button onClick={onClick} style={{cursor:"pointer",border:"none",borderRadius:6,fontWeight:600,letterSpacing:"0.3px",fontFamily:"inherit",...sizes[size],...vars[variant],...sx}}>{children}</button>;
}
function Field({label,value,onChange,multiline,placeholder,rows=3}) {
  const base={width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,padding:"8px 12px",fontSize:14,outline:"none",fontFamily:"inherit",boxSizing:"border-box"};
  return (
    <div style={{marginBottom:14}}>
      {label&&<label style={{display:"block",fontSize:11,color:C.sub,marginBottom:5,letterSpacing:"0.6px",textTransform:"uppercase"}}>{label}</label>}
      {multiline?<textarea rows={rows} style={{...base,resize:"vertical"}} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>:<input style={base} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>}
    </div>
  );
}
function FieldSelect({label,value,onChange,options}) {
  return (
    <div style={{marginBottom:14}}>
      {label&&<label style={{display:"block",fontSize:11,color:C.sub,marginBottom:5,letterSpacing:"0.6px",textTransform:"uppercase"}}>{label}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,padding:"8px 12px",fontSize:14,outline:"none",cursor:"pointer",fontFamily:"inherit"}}>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );
}
function Modal({title,onClose,onSave,onDelete,children}) {
  return (
    <div style={{position:"fixed",inset:0,background:C.overlay,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,width:"100%",maxWidth:520,maxHeight:"90vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.7)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"15px 20px",borderBottom:`1px solid ${C.border}`}}>
          <h3 style={{margin:0,fontSize:15,color:C.gold,fontWeight:600}}>{title}</h3>
          <Btn variant="ghost" onClick={onClose}>✕</Btn>
        </div>
        <div style={{padding:20}}>{children}</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",borderTop:`1px solid ${C.border}`}}>
          <div>{onDelete&&<Btn variant="danger" onClick={onDelete}>Elimina</Btn>}</div>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="ghost" onClick={onClose}>Annulla</Btn>
            <Btn variant="gold" onClick={onSave} size="md">Salva</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}
function Empty({icon,msg}) {
  return <div style={{textAlign:"center",color:C.sub,padding:"56px 24px"}}><div style={{fontSize:44,marginBottom:12}}>{icon}</div><p style={{margin:0,fontSize:14}}>{msg}</p></div>;
}

function Panoramica({progetto,setProgetto,personaggi,capitoli,note,luoghi,timeline}) {
  const completati=capitoli.filter(c=>c.stato==="Completato").length;
  const pct=capitoli.length?Math.round((completati/capitoli.length)*100):0;
  const cruciali=timeline.filter(e=>e.importanza==="Cruciale").length;
  return (
    <div style={{padding:20,maxWidth:720}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:10,marginBottom:20}}>
        {[{label:"Personaggi",value:personaggi.length,icon:"👤"},{label:"Capitoli",value:capitoli.length,icon:"📖"},{label:"Luoghi",value:luoghi.length,icon:"📍"},{label:"Timeline",value:timeline.length,icon:"⏱"},{label:"Note",value:note.length,icon:"📝"}].map(({label,value,icon})=>(
          <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 14px"}}>
            <div style={{fontSize:18}}>{icon}</div>
            <div style={{fontSize:22,fontWeight:700,color:C.gold,marginTop:4}}>{value}</div>
            <div style={{fontSize:10,color:C.sub,marginTop:2,textTransform:"uppercase",letterSpacing:"0.5px"}}>{label}</div>
          </div>
        ))}
      </div>
      {capitoli.length>0&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:16,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:"0.5px"}}>Avanzamento scrittura</span>
            <span style={{fontSize:14,color:C.gold,fontWeight:700}}>{pct}%</span>
          </div>
          <div style={{background:C.bg,borderRadius:4,height:6}}>
            <div style={{background:`linear-gradient(90deg,${C.gold},${C.goldLt})`,borderRadius:4,height:6,width:`${pct}%`,transition:"width .5s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
            <span style={{fontSize:12,color:C.sub}}>{completati} di {capitoli.length} completati</span>
            {cruciali>0&&<span style={{fontSize:12,color:"#D07070"}}>⚡ {cruciali} cruciali</span>}
          </div>
        </div>
      )}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:16}}>
        <div style={{fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:"0.6px",marginBottom:14}}>Info progetto</div>
        <Field label="Titolo" value={progetto.titolo} onChange={v=>setProgetto(p=>({...p,titolo:v}))} placeholder="Titolo del libro..."/>
        <Field label="Genere" value={progetto.genere} onChange={v=>setProgetto(p=>({...p,genere:v}))} placeholder="es. Thriller psicologico"/>
        <Field label="Sinossi" value={progetto.sinossi} onChange={v=>setProgetto(p=>({...p,sinossi:v}))} multiline rows={5} placeholder="La storia in poche righe..."/>
      </div>
    </div>
  );
}

function Personaggi({personaggi,setPersonaggi}) {
  const [ed,setEd]=useState(null);
  const [hov,setHov]=useState(null);
  const novo=()=>setEd({id:uid(),nome:"",ruolo:"Protagonista",descrizione:"",motivazioni:"",arco:"",_new:true});
  const save=()=>{if(!ed.nome.trim())return;setPersonaggi(ps=>ed._new?[...ps,{...ed,_new:undefined}]:ps.map(p=>p.id===ed.id?{...ed,_new:undefined}:p));setEd(null);};
  const del=()=>{setPersonaggi(ps=>ps.filter(p=>p.id!==ed.id));setEd(null);};
  return (
    <div style={{padding:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:16,color:C.text,fontWeight:600}}>Personaggi</h2>
        <Btn onClick={novo} size="md">+ Nuovo</Btn>
      </div>
      {personaggi.length===0&&<Empty icon="👤" msg="Nessun personaggio ancora."/>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:12}}>
        {personaggi.map(p=>{
          const rc=RUOLO_COLOR[p.ruolo]||"#3A3A6A";
          return (
            <div key={p.id} onClick={()=>setEd({...p})} onMouseEnter={()=>setHov(p.id)} onMouseLeave={()=>setHov(null)}
              style={{background:C.card,border:`1px solid ${hov===p.id?C.gold+"80":C.border}`,borderRadius:8,padding:14,cursor:"pointer",transition:"border-color .15s"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
                <span style={{fontSize:14,fontWeight:700,color:C.goldLt}}>{p.nome}</span>
                <Badge label={p.ruolo} bg={rc} fg={rc==="#6A2020"?"#D07070":"#8AB0D0"}/>
              </div>
              {p.descrizione&&<p style={{margin:0,fontSize:12,color:C.sub,lineHeight:1.6,display:"-webkit-box",overflow:"hidden",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{p.descrizione}</p>}
            </div>
          );
        })}
      </div>
      {ed&&(
        <Modal title={ed._new?"Nuovo personaggio":"Modifica personaggio"} onClose={()=>setEd(null)} onSave={save} onDelete={!ed._new?del:undefined}>
          <Field label="Nome *" value={ed.nome} onChange={v=>setEd(e=>({...e,nome:v}))} placeholder="Nome del personaggio"/>
          <FieldSelect label="Ruolo" value={ed.ruolo} onChange={v=>setEd(e=>({...e,ruolo:v}))} options={RUOLI}/>
          <Field label="Descrizione" value={ed.descrizione} onChange={v=>setEd(e=>({...e,descrizione:v}))} multiline rows={3} placeholder="Chi è?"/>
          <Field label="Motivazioni" value={ed.motivazioni} onChange={v=>setEd(e=>({...e,motivazioni:v}))} multiline rows={2} placeholder="Cosa vuole? Cosa teme?"/>
          <Field label="Arco narrativo" value={ed.arco} onChange={v=>setEd(e=>({...e,arco:v}))} multiline rows={2} placeholder="Come cambia?"/>
        </Modal>
      )}
    </div>
  );
}

function Capitoli({capitoli,setCapitoli}) {
  const [ed,setEd]=useState(null);
  const [hov,setHov]=useState(null);
  const novo=()=>setEd({id:uid(),numero:capitoli.length+1,titolo:"",sinossi:"",stato:"Da scrivere",svolta:"",_new:true});
  const save=()=>{if(!ed.titolo.trim())return;setCapitoli(cs=>ed._new?[...cs,{...ed,_new:undefined}]:cs.map(c=>c.id===ed.id?{...ed,_new:undefined}:c));setEd(null);};
  const del=()=>{setCapitoli(cs=>cs.filter(c=>c.id!==ed.id));setEd(null);};
  return (
    <div style={{padding:20,maxWidth:760}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:16,color:C.text,fontWeight:600}}>Capitoli</h2>
        <Btn onClick={novo} size="md">+ Nuovo</Btn>
      </div>
      {capitoli.length===0&&<Empty icon="📖" msg="Nessun capitolo ancora."/>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {capitoli.map(c=>{
          const sc=STATO_COLOR[c.stato];const st=STATO_TEXT[c.stato];
          return (
            <div key={c.id} onClick={()=>setEd({...c,svolta:c.svolta||""})} onMouseEnter={()=>setHov(c.id)} onMouseLeave={()=>setHov(null)}
              style={{background:C.card,border:`1px solid ${hov===c.id?C.gold+"80":C.border}`,borderLeft:`3px solid ${sc}`,borderRadius:8,padding:"12px 16px",cursor:"pointer",transition:"border-color .15s"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,color:C.sub,fontWeight:700}}>#{c.numero}</span>
                  <span style={{fontSize:14,fontWeight:600,color:C.text}}>{c.titolo}</span>
                  {c.svolta&&<span style={{fontSize:11,color:"#C09040",background:C.warn+"30",border:`1px solid ${C.warn}55`,borderRadius:4,padding:"1px 7px"}}>⚡ svolta</span>}
                </div>
                <Badge label={c.stato} bg={sc} fg={st}/>
              </div>
              {c.sinossi&&<p style={{margin:"6px 0 0 22px",fontSize:12,color:C.sub,lineHeight:1.5,display:"-webkit-box",overflow:"hidden",WebkitLineClamp:1,WebkitBoxOrient:"vertical"}}>{c.sinossi}</p>}
            </div>
          );
        })}
      </div>
      {ed&&(
        <Modal title={ed._new?"Nuovo capitolo":"Modifica capitolo"} onClose={()=>setEd(null)} onSave={save} onDelete={!ed._new?del:undefined}>
          <Field label={`Titolo — Cap. #${ed.numero} *`} value={ed.titolo} onChange={v=>setEd(e=>({...e,titolo:v}))} placeholder="Titolo del capitolo"/>
          <FieldSelect label="Stato" value={ed.stato} onChange={v=>setEd(e=>({...e,stato:v}))} options={STATI}/>
          <Field label="Sinossi" value={ed.sinossi} onChange={v=>setEd(e=>({...e,sinossi:v}))} multiline rows={4} placeholder="Cosa succede?"/>
          <Field label="⚡ Punto di svolta" value={ed.svolta} onChange={v=>setEd(e=>({...e,svolta:v}))} multiline rows={2} placeholder="Colpo di scena o svolta narrativa?"/>
        </Modal>
      )}
    </div>
  );
}

function Luoghi({luoghi,setLuoghi}) {
  const [ed,setEd]=useState(null);
  const [hov,setHov]=useState(null);
  const novo=()=>setEd({id:uid(),nome:"",tipo:"Interno",descrizione:"",atmosfera:"",note:"",_new:true});
  const save=()=>{if(!ed.nome.trim())return;setLuoghi(ls=>ed._new?[...ls,{...ed,_new:undefined}]:ls.map(l=>l.id===ed.id?{...ed,_new:undefined}:l));setEd(null);};
  const del=()=>{setLuoghi(ls=>ls.filter(l=>l.id!==ed.id));setEd(null);};
  const tipoIcon={"Interno":"🏠","Esterno":"🌿","Urbano":"🏙","Naturale":"🌲","Industriale":"🏭","Altro":"📍"};
  return (
    <div style={{padding:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:16,color:C.text,fontWeight:600}}>Luoghi</h2>
        <Btn onClick={novo} size="md">+ Nuovo</Btn>
      </div>
      {luoghi.length===0&&<Empty icon="📍" msg="Nessuna ambientazione ancora."/>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:12}}>
        {luoghi.map(l=>(
          <div key={l.id} onClick={()=>setEd({...l,note:l.note||""})} onMouseEnter={()=>setHov(l.id)} onMouseLeave={()=>setHov(null)}
            style={{background:C.card,border:`1px solid ${hov===l.id?C.gold+"80":C.border}`,borderRadius:8,padding:14,cursor:"pointer",transition:"border-color .15s"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7}}>
              <span style={{fontSize:14,fontWeight:700,color:C.goldLt}}>{tipoIcon[l.tipo]||"📍"} {l.nome}</span>
              <Badge label={l.tipo} bg={C.border} fg={C.sub}/>
            </div>
            {l.descrizione&&<p style={{margin:0,fontSize:12,color:C.sub,lineHeight:1.6,display:"-webkit-box",overflow:"hidden",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{l.descrizione}</p>}
            {l.atmosfera&&<p style={{margin:"5px 0 0",fontSize:11,color:C.gold+"AA",fontStyle:"italic",display:"-webkit-box",overflow:"hidden",WebkitLineClamp:1,WebkitBoxOrient:"vertical"}}>"{l.atmosfera}"</p>}
          </div>
        ))}
      </div>
      {ed&&(
        <Modal title={ed._new?"Nuovo luogo":"Modifica luogo"} onClose={()=>setEd(null)} onSave={save} onDelete={!ed._new?del:undefined}>
          <Field label="Nome *" value={ed.nome} onChange={v=>setEd(e=>({...e,nome:v}))} placeholder="es. Villa Morelli, Stazione..."/>
          <FieldSelect label="Tipo" value={ed.tipo} onChange={v=>setEd(e=>({...e,tipo:v}))} options={TIPI_LUOGO}/>
          <Field label="Descrizione" value={ed.descrizione} onChange={v=>setEd(e=>({...e,descrizione:v}))} multiline rows={3} placeholder="Come appare?"/>
          <Field label="Atmosfera" value={ed.atmosfera} onChange={v=>setEd(e=>({...e,atmosfera:v}))} multiline rows={2} placeholder="Che sensazione trasmette?"/>
          <Field label="Note" value={ed.note} onChange={v=>setEd(e=>({...e,note:v}))} multiline rows={2} placeholder="Dettagli, simbolismi..."/>
        </Modal>
      )}
    </div>
  );
}

function Timeline({timeline,setTimeline}) {
  const [ed,setEd]=useState(null);
  const novo=()=>setEd({id:uid(),titolo:"",momento:"",descrizione:"",personaggi:"",importanza:"Importante",_new:true});
  const save=()=>{if(!ed.titolo.trim())return;setTimeline(ts=>ed._new?[...ts,{...ed,_new:undefined}]:ts.map(t=>t.id===ed.id?{...ed,_new:undefined}:t));setEd(null);};
  const del=()=>{setTimeline(ts=>ts.filter(t=>t.id!==ed.id));setEd(null);};
  return (
    <div style={{padding:20,maxWidth:720}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:16,color:C.text,fontWeight:600}}>Timeline degli eventi</h2>
        <Btn onClick={novo} size="md">+ Evento</Btn>
      </div>
      {timeline.length===0&&<Empty icon="⏱" msg="Nessun evento ancora."/>}
      {timeline.length>0&&(
        <div style={{position:"relative",paddingLeft:28}}>
          <div style={{position:"absolute",left:9,top:10,bottom:10,width:2,background:`linear-gradient(to bottom,${C.gold}88,${C.border})`,borderRadius:2}}/>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {timeline.map(ev=>{
              const ic=IMP_COLOR[ev.importanza];const it=IMP_TEXT[ev.importanza];
              return (
                <div key={ev.id} style={{display:"flex",alignItems:"flex-start"}}>
                  <div style={{position:"relative",zIndex:1,marginRight:14,marginTop:14,flexShrink:0}}>
                    <div style={{width:14,height:14,borderRadius:"50%",background:ic,border:`2px solid ${it}`,cursor:"pointer"}} onClick={()=>setEd({...ev,personaggi:ev.personaggi||""})}/>
                  </div>
                  <div onClick={()=>setEd({...ev,personaggi:ev.personaggi||""})}
                    style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${ic}`,borderRadius:8,padding:"11px 14px",cursor:"pointer",transition:"border-color .15s"}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor=C.gold+"80"}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.borderLeftColor=ic;}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:ev.descrizione?5:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span style={{fontSize:14,fontWeight:600,color:C.text}}>{ev.titolo}</span>
                        {ev.momento&&<span style={{fontSize:11,color:C.gold+"BB",fontStyle:"italic"}}>{ev.momento}</span>}
                      </div>
                      <Badge label={ev.importanza} bg={ic} fg={it}/>
                    </div>
                    {ev.descrizione&&<p style={{margin:0,fontSize:12,color:C.sub,lineHeight:1.6,display:"-webkit-box",overflow:"hidden",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{ev.descrizione}</p>}
                    {ev.personaggi&&<p style={{margin:"4px 0 0",fontSize:11,color:C.sub+"99"}}>👤 {ev.personaggi}</p>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {ed&&(
        <Modal title={ed._new?"Nuovo evento":"Modifica evento"} onClose={()=>setEd(null)} onSave={save} onDelete={!ed._new?del:undefined}>
          <Field label="Titolo *" value={ed.titolo} onChange={v=>setEd(e=>({...e,titolo:v}))} placeholder="es. La scomparsa di Marco..."/>
          <Field label="Quando / Momento" value={ed.momento} onChange={v=>setEd(e=>({...e,momento:v}))} placeholder="es. 10 anni prima, Cap. 3..."/>
          <FieldSelect label="Importanza" value={ed.importanza} onChange={v=>setEd(e=>({...e,importanza:v}))} options={IMPORTANZA}/>
          <Field label="Descrizione" value={ed.descrizione} onChange={v=>setEd(e=>({...e,descrizione:v}))} multiline rows={4} placeholder="Cosa succede? Quali conseguenze?"/>
          <Field label="Personaggi coinvolti" value={ed.personaggi} onChange={v=>setEd(e=>({...e,personaggi:v}))} placeholder="es. Marco, Elena..."/>
        </Modal>
      )}
    </div>
  );
}

function Note({note,setNote}) {
  const [ed,setEd]=useState(null);
  const [hov,setHov]=useState(null);
  const novo=()=>setEd({id:uid(),titolo:"",testo:"",_new:true});
  const save=()=>{if(!ed.testo.trim())return;setNote(ns=>ed._new?[...ns,{...ed,_new:undefined}]:ns.map(n=>n.id===ed.id?{...ed,_new:undefined}:n));setEd(null);};
  const del=()=>{setNote(ns=>ns.filter(n=>n.id!==ed.id));setEd(null);};
  return (
    <div style={{padding:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:16,color:C.text,fontWeight:600}}>Note & Idee</h2>
        <Btn onClick={novo} size="md">+ Nuova</Btn>
      </div>
      {note.length===0&&<Empty icon="📝" msg="Nessuna nota ancora."/>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:12}}>
        {note.map(n=>(
          <div key={n.id} onClick={()=>setEd({...n})} onMouseEnter={()=>setHov(n.id)} onMouseLeave={()=>setHov(null)}
            style={{background:C.card,border:`1px solid ${hov===n.id?C.gold+"80":C.border}`,borderTop:`3px solid ${C.gold}`,borderRadius:8,padding:14,cursor:"pointer",minHeight:90,transition:"border-color .15s"}}>
            {n.titolo&&<div style={{fontSize:13,fontWeight:600,color:C.goldLt,marginBottom:6}}>{n.titolo}</div>}
            <p style={{margin:0,fontSize:12,color:C.sub,lineHeight:1.65,display:"-webkit-box",overflow:"hidden",WebkitLineClamp:5,WebkitBoxOrient:"vertical"}}>{n.testo}</p>
          </div>
        ))}
      </div>
      {ed&&(
        <Modal title={ed._new?"Nuova nota":"Modifica nota"} onClose={()=>setEd(null)} onSave={save} onDelete={!ed._new?del:undefined}>
          <Field label="Titolo (opzionale)" value={ed.titolo} onChange={v=>setEd(e=>({...e,titolo:v}))} placeholder="es. Idea per il finale..."/>
          <Field label="Testo *" value={ed.testo} onChange={v=>setEd(e=>({...e,testo:v}))} multiline rows={7} placeholder="Scrivi la tua nota..."/>
        </Modal>
      )}
    </div>
  );
}

function App() {
  const [tab,setTab]=useState(0);
  const [progetto,setProgetto]=useState({titolo:"Il Debito dell'Anima",genere:"Thriller Psicologico",sinossi:""});
  const [personaggi,setPersonaggi]=useState([]);
  const [capitoli,setCapitoli]=useState([]);
  const [note,setNote]=useState([]);
  const [luoghi,setLuoghi]=useState([]);
  const [timeline,setTimeline]=useState([]);

  useEffect(()=>{
    const p=lsGet("sp_progetto"); if(p)setProgetto(p);
    const pe=lsGet("sp_personaggi"); if(pe)setPersonaggi(pe);
    const ca=lsGet("sp_capitoli"); if(ca)setCapitoli(ca);
    const no=lsGet("sp_note"); if(no)setNote(no);
    const lu=lsGet("sp_luoghi"); if(lu)setLuoghi(lu);
    const ti=lsGet("sp_timeline"); if(ti)setTimeline(ti);
  },[]);

  useEffect(()=>lsSet("sp_progetto",progetto),[progetto]);
  useEffect(()=>lsSet("sp_personaggi",personaggi),[personaggi]);
  useEffect(()=>lsSet("sp_capitoli",capitoli),[capitoli]);
  useEffect(()=>lsSet("sp_note",note),[note]);
  useEffect(()=>lsSet("sp_luoghi",luoghi),[luoghi]);
  useEffect(()=>lsSet("sp_timeline",timeline),[timeline]);

  return (
    <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"Georgia,'Times New Roman',serif"}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"13px 20px"}}>
        <div style={{display:"flex",alignItems:"baseline",gap:10}}>
          <span style={{fontSize:13,color:C.gold,opacity:0.6}}>✒</span>
          <h1 style={{margin:0,fontSize:18,color:C.gold,fontWeight:700}}>{progetto.titolo||"Senza titolo"}</h1>
          {progetto.genere&&<span style={{fontSize:12,color:C.sub,fontStyle:"italic"}}>{progetto.genere}</span>}
        </div>
      </div>
      <div style={{display:"flex",background:C.panel,borderBottom:`1px solid ${C.border}`,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        {TABS.map((t,i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{background:"transparent",border:"none",borderBottom:i===tab?`2px solid ${C.gold}`:"2px solid transparent",color:i===tab?C.gold:C.sub,cursor:"pointer",padding:"11px 16px",fontSize:13,whiteSpace:"nowrap",fontWeight:i===tab?600:400,transition:"all .15s",fontFamily:"Georgia,serif"}}>
            {t}
          </button>
        ))}
      </div>
      {tab===0&&<Panoramica progetto={progetto} setProgetto={setProgetto} personaggi={personaggi} capitoli={capitoli} note={note} luoghi={luoghi} timeline={timeline}/>}
      {tab===1&&<Personaggi personaggi={personaggi} setPersonaggi={setPersonaggi}/>}
      {tab===2&&<Capitoli capitoli={capitoli} setCapitoli={setCapitoli}/>}
      {tab===3&&<Luoghi luoghi={luoghi} setLuoghi={setLuoghi}/>}
      {tab===4&&<Timeline timeline={timeline} setTimeline={setTimeline}/>}
      {tab===5&&<Note note={note} setNote={setNote}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
